fer=""></script><script src="/_next/static/PfMI2f3ZGEQqBYL-xM6Ez/_ssgManifest.js" defer=""></script></head><body class="mx-auto max-w-2xl bg-[#fafaea] px-3 py-10 md:px-5 md:py-20"><div id="__next"><div class="__className_3aee0a"><main><h1 class="text-lg font-semibold">Blog</h1><p class="mt-3 text-sm">지나온 일들을 회고한 기록들 입니다.</p><div class="mt-2 flex flex-wrap gap-3 text-xs"><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/">되돌아가기</a><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/discover">지식창고</a><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/question">코딩 테스트</a></div><div class="mt-10 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/sprint-day1">코드잇 단기 부트캠프를 수료하면서</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-08-31</p></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/pre-onboarding-2024-03">원티드 프리온보딩 프론트엔드 챌린지 3월 후기</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-03-24</p></li></ul></div></main></div></div><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"코드잇 단기 부트캠프를 수료하면서","desc":"","thumbnail":"","tags":["블로그"],"date":"2024-08-31","content":"\n### 개요\n약 퍼블리셔로 3년간 일하고 프론트엔드로 전향하고 싶다는 목표가 생겼습니다. 퍼블리셔로 외주를 받아서 일을 하여 프론트엔드 공부를 약 6개월 정도 하고 난뒤 여러 개인 프로젝트를 만들어 취업시장에 들어갔으나 원하는 회사에 들어가는건 어려웠습니다.\n\n제가 부족한건 뭔지 공부를 제대로 진행하는건지에 대한 의구심이 들었고 부트캠프를 한번 다녀봐야겠다 라는 생각이 들었습니다. 하지만 6개월 과정은 너무 길게 느껴졌고 아예 다시 처음부터 똑같은것을 공부한다는거에 지칠것 같아\n짧게 할만한건 없나 하고 찾아보다 코드잇 단기 부트캠프를 찾아 신청하게 되었고 단기 심화 2기를 진행 하게 되었습니다.\n\n해당 부트캠프를 진행하면서 좋았던점 개선했으면 좋았을것 같았던점을 블로그에 정리 해보려고 합니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 교육 과정\n\n코드잇 단기 심화 2기 같은경우 2주 정도의 교육을 들었고 6주 정도 팀으로 프로젝트를 진행 하였습니다.\n월 ~ 목 9 to 7, 금 9 to 6로 굉장히 긴 시간을 교육을 받았고 초반에는 TailwindCSS를 집중적으로 교육 받았습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 2주간의 교육\nTailwindCSS 같은경우 너무 자주 사용하는 CSS 프레임워크 이기도 하고 프론트엔드면 무조건 알고 있을수 밖에 없기 때문에 시간이 조금 아깝다는 생각이 들었습니다.\n\n그 후에는 React-spring, Framer Motion로 애니메이션 라이브러리를 배웠습니다.\n저 같은 경우 퍼블리셔로 GSAP를 자주 애용 했기 때문에 배우는건 어렵지 않았지만 이런 라이브러리가 있는지 몰랐기 때문에 흥미로 웠습니다.\n\n애니메이션 라이브러리가 끝난 이후에는 Jest를 이용한 테스트 코드를 작성하는것이였습니다.\n이때부터 저는 교육에 많은 흥미를 느꼇고 집중해서 들었습니다. \n테스트 코드는 부작용을 방지하기 때문에 회사 내부에 QA팀이 없을경우 매우 편하다고 생각하기 때문에 필수라고 생각합니다.\n\n마지막 교육은 Github Actions을 이용한 CI/CD이였습니다.\n저 같은 경우 CI/CD를 제대로 작성해본적이 없었기 때문에 매우 유익한 시간이 되었습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n\n### 6주간의 프로그램\n6주간의 프로그램은 조금 당황스러운 일이 많았습니다. 단기 심화를 진행하면서 많은 분들이 이탈을 했기 때문입니다.\n정확한 이유는 모르겠지만 아무래도 초반 커리큘럼을 보지 않았던 분들이 TailwindCSS를 다시 배우다보니 굳이 들을 필요 없겠다라고 생각하신분들이 많았던것 같습니다.\n\n저 같은경우 팀원이 3번이나 교체가 되었습니다. 3번이나 교체되면서 사기가 조금 떨어졌지만 팀장역할을 맡으신분과 케미가 잘 맞아서 다행히 즐거운 마인드로 프로그램을 진행하였습니다.\n\n저희 프로젝트 같은경우는 코드잇에서 지원해주는 API를 이용해서 개발을 진행하였고 모임을 찾는 서비스이기에 검색이 잘되어야 하여 SEO 기반으로 작성하기 위해서 Next.js에서 App router를 주요 기술로 잡았고\n\nServer action과 React-query를 조합해서 데이터패칭을 하였습니다.\n\n도중 코드잇에서 지원해주는 멘토링을 들으면서 부족한건 무엇인지 어떤 코드로 리펙토링 하면 좋을지에 대해서 들었고\n타입 스크립트의 유틸리티 함수인 Omit과 Pick을 사용해서 타입을 정리하고 customHook을 작성해서 코드의 가독성을 높혔습니다.\n\n또한 팀원들끼리의 코드리뷰를 진행해서 클린코드를 작성하기 위해 노력했습니다.\n\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 얻은점\n멘토링을 들으면서 제 공부의 갈피가 잡히기 시작했습니다. 저에게 있어 굉장히 유익한 시간이 되었고 팀장 역할을 맡으신분과 주말에도 스터디를 열어서 같이 어떤것을 중점으로 공부하고 리펙토링을 진행할지도 대화를 나눴으며 제 코드가 굉장히 깔끔해지고 유연성이 좋아지며 가독성까지 좋아진것이 제 눈에 보여서 굉장히 유익했던 시간이 되었던것 같습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 개선해야할점\n코드잇에서 지원해주는 API가 조금 빈약하다고 많이 느꼈습니다. 이것은 추가해줬으면 좋았거나 이런 기능은 있었으면 좋겠다는것이 많았으나 추가하는것은 힘들다는 연락을 받아서 조금 아쉬웠습니다.\n\n또한 팀원을 잘못 만나면 프로젝트를 제대로 완수하지 못할것이라는 생각이 들었습니다. 저 같은 경우 책임감 있게 끝까지 해주신 팀원분들이 있었기에 잘 마무리 할 수 있었던것 같습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 앞으로 해야할일\n함수형 프로그래밍이 많이 떠오르고 리액트는 애초에 함수형 프로그래밍으로 짜여있는것으로 알고 있어 저 또한 함수형 프로그래밍 위주로 공부하여 코드를 계속해서 리펙토링 해나갈 생각입니다.\n짧으면 짧고 길다면 긴 8주간의 단기 부트캠프를 수료하면서 얻은것도 많지만 다시 취업시장에 들어간다는것은 매우 떨리고 겁이 납니다.\n\n계속해서 꾸준히 공부하면서 프론트엔드로 한발자국씩 전진해나갈 생각입니다.\n\n","slug":"/post/sprint-day1","readingMinutes":9,"wordCount":514},{"title":"원티드 프리온보딩 프론트엔드 챌린지 3월 후기","desc":"","thumbnail":"","tags":["블로그"],"date":"2024-03-24","content":"\n![240914-133232](/posts/pre-onboarding-2024-03/240914-133232.png)\n\n### 참여하게 된 계기\n\n퍼블리셔로 일하고 프론트엔드 공부를 한지 약 1년이 다 되어가는데 아직 실무 경험은 없었기 때문에 실무에서 어떤 것을 쓰는 것이 좋을지 지금 내 이력서에는 부족한 것이 무엇인지 내가 잘 배우고 있는지 궁금해서 프리온보딩을 신청해서 듣기로 정했습니다.\n\n### 사전과제\n\n사전과제는 그렇게 어렵지 않았습니다\n간단 todolist 만드는것과 질문의 답을 적는 것이었습니다.\n\n[https://github.com/Banal972/wanted-pre-onboarding-frontend-challenge](https://github.com/Banal972/wanted-pre-onboarding-frontend-challenge)\n\n### 기간\n\n기간은 OT를 제외하고 3.4 ~ 3.15까지 강의를 들었습니다.\n\n### OT 안내\n\nOT는 간단하게 어떻게 강의가 진행되는지 목차를 알려주고 안내해 주는 것으로 마무리했습니다.\n\n### 1주차\n\n1주차는 web의 역사와 react의 개념을 알려주는 시간이었습니다.\n\nweb이 어떻게 발전을 해왔는지 dom이 무엇인지 virtual Dom 은 어떤 것인지 알려주는 그런 면접 위주로 나올만한 것을 알려주고 알아두면 확실히 좋은 개념들을 알려줘서 좋았습니다.\n\n### 2주차\n\n2주차에서는 상태관리인 redux-toolkit에 관해서 알려주는 시간이었습니다.\n\n현업에서는 redux-toolkit을 아직 많이 사용한다고 합니다. 왜냐면 devtools도 존재하고 아직 많은 개발자가 redux-toolkit을 사용해서 에러 찾는 법도 쉽고 커뮤니티가 활성화되어있어서 그렇습니다.\n\n### 3주차\n\n3주차는 폴더 구조, 프로젝트 구조, Error Handling, Modal 구현하기 와 같은 현업에서 사용되는 구조 및 custom hook을 생성하고 provider를 생성해서 간단하게 Custom Modal을 만드는 법을 배워보았습니다.\n\n### 4주차\n\n마지막 주차는 현업에서 Coding Convention을 어떻게 하는지 배우고 나머지는 이력서 피드백 시간이었습니다.\n\n### 후기\n\n전체적으로 나쁘지 않은 강의였습니다 주니어 개발자가 들으면 정말 좋은 강의였던 것 같고 기본적인 개념에 대해서 조금 더 집중적으로 배우고 저는 아직 custom hook을 어떤 상황에서 만들어야 할지 감이 안 잡히는 상황이었는데 강의를 들으면서 여러 개인 프로젝트나 팀 프로젝트에 custom hook을 만들어서 적용해보고 있습니다.\n\n몰랐던 사실도 알 수 있었고 챌린지에 대해서 후회는 전혀 없었습니다. 4월 챌린지도 참여하고 싶지만 지금 하고 있는 것이 매우 많아서 4월은 힘들 것 같아서 아쉽지만 다음에 또 챌린지가 있다면 또 듣고 싶은 챌린지였습니다!\n\n[https://www.wanted.co.kr/](https://www.wanted.co.kr/)","slug":"/post/pre-onboarding-2024-03","readingMinutes":4,"wordCount":262}]]]},"__N_SSG":true},"page":"/blog","query":{},"buildId":"PfMI2f3ZGEQqBYL-xM6Ez","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
