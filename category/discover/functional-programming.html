utton type="button"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M64 384h384v-42.67H64zm0-106.67h384v-42.66H64zM64 128v42.67h384V128z"></path></svg></button></div><main><h1 class="text-lg font-semibold"></h1><p class="mt-2 break-keep text-sm"></p><div class="mt-5 flex flex-wrap gap-3 text-xs"><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/">되돌아가기</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/blog">블로그</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/discover">TIL</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/question">코딩 테스트</a></div><div class="mt-5 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/functional-programming-2"><p class="break-keep">함수형 프로그래밍 - (2)</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-10-02</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/functional-programming-1"><p class="break-keep">함수형 프로그래밍 - (1)</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-09-25</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/functional-programming-0912"><p class="break-keep">함수형 프로그래밍의 입문기</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-09-12</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"함수형 프로그래밍 - (2)","desc":"","thumbnail":"","tags":["functional-programming"],"date":"2024-10-02","content":"\n#### 이 문서를 읽기전에\n[함수형 프로그래밍 입문기](/post/functional-programming-0912)를 읽어보는것을 추천드립니다.\n\n#### 함수형 프로그래밍은 어떻게 구분해야할까?\n\n이전에 작성했던 함수형 프로그래밍 문서에서는 함수형 프로그래밍이 어떤것인지, 어떻게 작성하면 좋은건지에 대해서 작성을 했었습니다.\n\n오늘은 함수형 프로그래머로서 함수형 프로그래밍의 대한 구분을 한번 작성해볼려고 합니다.\n\n\n#### 함수형 프로그래밍의 구분\n\n함수형 프로그래밍은 세 분류로 나눌수 있을것 같습니다.\n\n1. 액션\n2. 계산\n3. 데이터\n\n이 세 분류로 나눌수가 있는데 이 분류는 매우 중요하며 자세히 한번 배워볼려고 합니다.\n\n\n#### 액션\n액션은 실행 시점이나 횟수, 혹은 둘다 의존하는것을 의미합니다.\n부수효과, 부수 효과가 있는 함수, 순수하지 않는 함수 라고도 부릅니다.\n\n예를 들면 **이메일 보내기**, **DB 읽기** 같은것을 의미합니다.\n\n#### 계산\n입력을 출력으로 계산할때 사용합니다.\n\n이 부분은 순수함수, 수학 함수라고 부릅니다.\n\n예를 들면 **최댓값 찾기**, **이메일 주소가 올바른지** 같은것을 의미합니다.\n\n#### 데이터\nDB에서 읽어온 데이터 혹은 사용자가 입력한 이메일 주소 같은것을 데이터 라고 부릅니다.\n\n\n함수형 프로그래머는 더 좋은 코드를 만들기 위해서 이미 있는 코드를 액션, 계산, 데이터로 리펙터링 하는 방법을 찾을 수 있고 분류한 기술을 적용하는법을 익혀야 합니다.\n\n\n#### 예를 들어 분류 하기\n- 이메일 보내기\n    - 액션\n- DB에서 회원 가져오기\n    - 액션\n- 회원 등급 매기기\n    - 데이터\n- 이메일 주소\n    - 데이터\n- 이메일 제목\n    - 데이터\n- 이메일 본문\n    - 데이터\n- 어떤 회원이 이메일을 받을지\n    - 계산\n\n\n이렇게 볼 수 있을것 같습니다.","slug":"/post/functional-programming-2","readingMinutes":3,"wordCount":205,"category":"discover"},{"title":"함수형 프로그래밍 - (1)","desc":"","thumbnail":"","tags":["functional-programming"],"date":"2024-09-25","content":"\n#### 이 문서를 읽기전에\n[함수형 프로그래밍 입문기](/post/functional-programming-0912)를 읽어보는것을 추천드립니다.\n\n\n### 어떤것이 함수형 프로그래밍일까?\n\n#### 순수 함수\n\n함수형 프로그래밍의 특징으로는 순수 함수라는 특징이 있습니다.\n입문기에서도 적었다 싶이 순수 함수는 SideEffect가 없는것을 순수함수이며\nSideEffect는 외부 상태값을 참조하거나 변경하지 않는것 않는것을 얘기합니다.\n\n예를 들어\n```js\nlet num = 1;\nfunction add(a){\n    return a + num;\n}\n```\n이것은 순수함수가 아닙니다.\n\n```js\nfunction add(a,b){\n    return a+b;\n}\n```\n이것은 순수함수 입니다.\n순수함수는 호출할때마다 항상 같은 값을 가져옵니다.\n\n\u003cbr/\u003e\n\n객체도 마찬가지 입니다.\n```js\nlet student = { name : \"kim\", grade : 1};\n\nfunction incStudent(student){\n    student.grade = 2;\n    return student;\n}\n```\n이것은 순수 함수가 아닙니다. \n객체를 가져와서 객체의 값을 변경하기 때문입니다.\n\n```js\nlet student = { name : \"kim\", grade : 1};\n\nfunction incStudent(student){\n    return {...student, grade : student.grade++};\n}\n```\n이것은 순수함수입니다. \n객체를 변경하지 않고 새로운 객체를 반환해주기 때문에 외부의 상태를 변경하지 않기 때문입니다.\n\n이렇게 되면 부수효과 즉 sideEffect를 만들지 않아 불변성을 유지하고, 멑티쓰레딩 환경에서도 안정적이게 만들수 있습니다.\n\n\u003cbr/\u003e\n\n#### for, switch, if 같은것을 사용하지말자\n```js\nconst numbers = [1,2,3,4,5]\n\nfunction iterate(numbers) {\n    let sum = 0;\n    for (let i = 0; i \u003c numbers.length; i++){\n        sum += arr[i];\n    }\n    return sum;\n}\n```\n이렇게 for, switch, if를 쓰는것은 함수형 프로그래밍이라고 볼 수 없습니다.\n\n\n```js\nconst numbers = [1,2,3,4,5]\n\nfunction iterate(numbers) {\n    return numbers.reduce((acc,cur)=\u003eacc+cur,0);\n}\n```\n위의 for문을 reduce나 map, filter등 여러가지 메서드들을 활용해서 작성하는것을 함수형 프로그래밍 이라고 합니다.\n\n\u003cbr/\u003e\n\n#### 일급함수 특징을 활용하자\n함수를 변수에 할당해서 사용하는 방법도 있습니다.\n```js\nconst double = (x) =\u003e x * 2;\nconst addOne = (x) =\u003e x + 1;\nconst doubleThenAddOne = (x) =\u003e addOne(double(x));\nconsole.log(doubleThenAddOne(5)); \n```\n\n함수에서 또 다른 함수를 리턴하는 고차함수 방법도 있습니다.\n```js\nconst greaterThan = n =\u003e x =\u003e x \u003e n;\n\nconst greaterThan10 = greaterThan(10);\nconsole.log(greaterThan10(15)); // true\nconsole.log(greaterThan10(5));  // false\n```\n\n\u003cbr/\u003e\n\n#### 마지막으로\n함수형 프로그래밍의 기본기는 알았는데 아직까지 깊게 사용하는법을 잘 몰라\n여러가지의 공부가 필요할것 같습니다. 앞으로 함수형 프로그래밍에 더 집중해서 공부하고 정리해보도록 하겠습니다.","slug":"/post/functional-programming-1","readingMinutes":4,"wordCount":317,"category":"discover"},{"title":"함수형 프로그래밍의 입문기","desc":"","thumbnail":"","tags":["functional-programming"],"date":"2024-09-12","content":"\n### 함수형 프로그래밍 이란?\n함수형 프로그래밍은 도대체 무엇일까?\n위키피디아에 나오는것을 보면 수학 함수를 사용하고 side effect를 피하는 것이 특징인 프로그래밍 패터다임이라고 나와 있고\nside effect 없이 순수 함수만 사용하는 프로그래밍 스타일 이라고 보면 됩니다.\n\n\n\u003e **Side Effect란?**\n  함수나 표현식이 자신의 스코프 외부에 있는 상태를 변경하거나 관찰 가능한 상호작용을 하는 것을 의미 합니다.\n\n\u003e **순수 함수란?**\n  인자에만 의존하고 side effect가 없는 함수를 의미 합니다.\n\n\n### 함수형 프로그래밍을 사용하는 이유?\n- 코드의 가독성과 유지보수성 향상\n  - 순수 함수를 사용하여 side effect를 줄이고 예측 가능한 코드를 작성합니다.\n- 테스트와 디버깅 용이성\n  - 함수의 입출력이 명확하여 단위 테스트가 쉬움\n- 불변성\n  - 함수 외부에서의 데이터를 수정하지 않습니다.\n- 고참 함수\n\n이것이 대표적인것 같습니다.\n\n\n### 자바스크립트의 함수 프로그래밍\n\n간단하게 자바스크립트에서 짝수를 구하는 코드를 보면\n\n```js\n// 명령형\n\nconst arr = [1, 2, 3, 4, 5, 6];\n\nconst even = [];\n\nfor (let i = 0; i \u003c arr.length; i++) {\n  if (arr[i] % 2 === 0) {\n    even.push(arr[i]);\n  }\n}\n\n```\n\n이렇게 명령형의 코드를\n\n```js\n// 함수형\nconst arr = [1, 2, 3, 4, 5, 6];\nconst even = arr.filter((num) =\u003e num % 2 === 0);\n```\n\n이렇게 함수형으로 작성할 수 있습니다.\n이렇게 작성이 될 경우 side effect를 없애고 예측 가능성이 높고 테스트하기 쉬운 코드를 작성 할 수 있습니다.\n","slug":"/post/functional-programming-0912","readingMinutes":3,"wordCount":206,"category":"discover"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["discover","functional-programming"]},"buildId":"BsGAOomFWk3RNbwqyKqq1","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
