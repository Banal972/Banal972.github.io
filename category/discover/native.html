Box="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-10-11</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"expo에서 svg를 사용하는법","desc":"","thumbnail":"","tags":["native"],"date":"2024-10-12","content":"\n#### 개요\nExpo의 프로젝트를 진행중에 SVG를 사용해서 ICON를 관리를 할 필요가 생겼고\n```tsx\n\u003cImage source={require(\"경로\")}\u003e\n```\n이와 같이 svg를 불러와도 불러와지지 않다는것을 발견했고 SVG는 따로 패키지들을 설치해줄 필요가 있다는걸 알았습니다.\n\n\u003cbr/\u003e\n\n#### 패키지 설치\n\nexpo에서 SVG를 사용하기 위해서는 첫번째로 `react-native-svg`라는 패키지가 필요합니다.\n\n`react-native-svg`패키지는 React-Native에서 Svg의 태그를 사용할 수있게 해줍니다.\n```tsx\nimport Svg, { Circle, Rect } from 'react-native-svg';\n\nexport default function SvgComponent(props) {\n  return (\n    \u003cSvg height=\"50%\" width=\"50%\" viewBox=\"0 0 100 100\" {...props}\u003e\n      \u003cCircle cx=\"50\" cy=\"50\" r=\"45\" stroke=\"blue\" strokeWidth=\"2.5\" fill=\"green\" /\u003e\n      \u003cRect x=\"15\" y=\"15\" width=\"70\" height=\"70\" stroke=\"red\" strokeWidth=\"2\" fill=\"yellow\" /\u003e\n    \u003c/Svg\u003e\n  );\n}\n```\n\n두번째로는 `react-native-svg-transformer`라는 패키지가 필요합니다.\n\n`react-native-svg-transformer`패키지는 SVG파일을 React와 호환할 수 있도록 컴포넌트화 시켜줍니다.\n\n`react-native-svg-transformer`를 사용하기 위해서는 `metro.config.js`를 수정해줘야 합니다.\n```\nconst { getDefaultConfig } = require(\"expo/metro-config\");\n\nmodule.exports = (() =\u003e {\n  const config = getDefaultConfig(__dirname);\n\n  const { transformer, resolver } = config;\n\n  config.transformer = {\n    ...transformer,\n    babelTransformerPath: require.resolve(\"react-native-svg-transformer/expo\")\n  };\n  config.resolver = {\n    ...resolver,\n    assetExts: resolver.assetExts.filter((ext) =\u003e ext !== \"svg\"),\n    sourceExts: [...resolver.sourceExts, \"svg\"]\n  };\n\n  return config;\n})();\n```\n이 방식은 `Expo SDK v41.0.0` 이후 버전 에서 적용하는 방식이며\n\n[다른 방식](https://github.com/kristerkari/react-native-svg-transformer)은 여기서 참고해주세요\n\n\n모든 설치가 완료 되었다면\n\n```tsx\nimport Logo from './assets/logo.svg';\n\n\u003cLogo width={120} height={40} /\u003e;\n```\n\n이런식으로 SVG를 import해서 사용할 수 있게 됩니다.\n\n\u003cbr/\u003e\n\n#### 참고\nhttps://github.com/software-mansion/react-native-svg\nhttps://github.com/kristerkari/react-native-svg-transformer","slug":"/post/expo-svg","readingMinutes":2,"wordCount":201,"category":"discover"},{"title":"Expo에서 아코디언을 만들어보자","desc":"","thumbnail":"","tags":["native"],"date":"2024-10-12","content":"\n#### 개요\n\nExpo 프로젝트에서 고객센터 페이지를 만들다가 **Q.질문입니다. ↓** 를 누르면 해당 답변 내용이 나오는 애니메이션 있으면 사용자 경험에 좋을것 같아\n아코디언을 만들수있는지 알아보았습니다.\n\n알아보면서 여러 라이브러리를 찾게 되었지만 React Native에서 지원해주는 **LayoutAnimation**를 사용하는 편이 아무래도 더 좋을것 같다는 생각이들어\n해당 API를 사용해서 아코디언을 만들게 되었습니다.\n\n\u003cbr/\u003e\n\n#### 필요한 API\n\n[React Native DOCS - API](https://reactnative.dev/docs/accessibilityinfo) 여기서 React Native에서 지원해주는 API를 볼 수 있는데\n**LayoutAnimation**를 사용해서 만들어볼려고 합니다.\n\n- **LayoutAnimation란?**\n    - LayoutAnimation는 레이아웃이 변경 시에 자연스러운 애니메이션 효과를 제공하는 API입니다.\n\n\u003cbr/\u003e\n\n#### 아코디언 UI\n\n```tsx\nconst [isOpen, setIsOpen] = useState(false);\n\u003cView\u003e\n    \u003cTouchableOpacity\u003e\n        \u003cText\u003eQ.질문입니다.\u003c/Text\u003e\n    \u003c/TouchableOpacity\u003e\n    {\n        isOpen \u0026\u0026 \u003cText\u003e답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다.\u003c/Text\u003e\n    }\n\u003c/View\u003e\n```\n\u003e 해당 UI는 예시로 든것이며 실제로는 제대로 나오지 않을수 있습니다.\n\n\u003cbr/\u003e\n\n#### LayoutAnimation 적용하기\n```tsx\n    const [isOpen, setIsOpen] = useState(false);\n    \n    const toggleAccordion = ()=\u003e{\n        LayoutAnimation.configureNext({\n            duration: 300,\n            update: {\n                property: LayoutAnimation.Properties.opacity,\n                type: LayoutAnimation.Types.easeInEaseOut,\n            },\n            delete: {\n                property: LayoutAnimation.Properties.opacity,\n                type: LayoutAnimation.Types.easeInEaseOut,\n            },\n        });\n        setIsOpen(!isOpen)\n    }\n\n    \u003cView\u003e\n        \u003cTouchableOpacity onPress={toggleAccordion}\u003e\n            \u003cText\u003eQ.질문입니다.\u003c/Text\u003e\n        \u003c/TouchableOpacity\u003e\n        {\n            isOpen \u0026\u0026 \u003cText\u003e답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다. 답변입니다.\u003c/Text\u003e\n        }\n    \u003c/View\u003e\n```\n\n`LayoutAnimation`는 기본적으로 `Properties`,`Types`,`linear` 등 여러가지 **Properties**를 가지고 있습니다.\n\n제가 사용할건 `Properties`와 `Types`만 사용할 예정입니다. `Properties`에는 `opacity`이 들어가있고 `Types`에는 `easeInEaseOut`가 들어가 있습니다.\n\n해당 부분을 `configureNext`메서드를 통해 `config`을 설정해줄수 있는데 `duartion`을 설정해주고 **layout**이 `update` 되거나 `delete`될때 어떻게 애니메이션이 들어가면 좋을지 설정해주면 변동되는 애니메이션 부분에 `LayoutAnimation` 애니메이션을 구현해줍니다.\n\n이렇게 할경우 애니메이션이 작동되게 됩니다.\n\n`LayoutAnimation.configureNext`는 뷰 계층에 있는 모든 레이아웃에 변화에 애니메이션을 적용하게 됩니다.\n즉 `isOpen \u0026\u0026` 부분에 있는 `\u003cText\u003e\u003c/Text\u003e`에 변동이 생기기 때문에 그 부분에 적용이 되는거죠\n\n\u003cbr/\u003e\n\n#### 참고\nhttps://reactnative.dev/docs/layoutanimation#configurenext","slug":"/post/expo-accodiran","readingMinutes":4,"wordCount":248,"category":"discover"},{"title":"expo-build-properties를 이용한 expo 빌드 최적화","desc":"","thumbnail":"","tags":["native"],"date":"2024-10-11","content":"\n#### 개요\nExpo를 이용하여 빌드를 할려고 했을때 용량이 생각보다 크게 나오는것을 발견했습니다.\n기본적으로 Expo는 Native의 개발 편의성을 극대화 하고 빌드 시 포함되는 설정들이 많기에 빌드의 용량이 클수밖에 없다는것을 알게 되었고\n최적화하는 방법을 찾아보았을때 expo-build-properties를 발견할 수 있었습니다.\n\n\u003cbr/\u003e\n\n#### expo-build-properties란?\n\nexpo-build-properties는 Expo 프로젝트의 빌드 환경을 설정하는데 도와주는 패키지 입니다.\n\n해당 패키지는 다양한 최적화 옵션들을 제공합니다.\n\n해당 옵션들을 [docs](https://docs.expo.dev/versions/latest/sdk/build-properties/?redirected) 에서 확인 가능합니다.\n\n\n`npx expo install expo-build-properties`로 **expo-build-properties**를 설치하고\n\napp.json에서 해당 빌드 설정을 해주면 됩니다.\n```json\n{\n  \"expo\": {\n    \"plugins\": [\n      [\n        \"expo-build-properties\",\n        {\n          \"android\": {\n            // 안드로이드 빌드 설정\n          },\n          \"ios\": {\n            // 아이폰 빌드 설정\n          }\n        }\n      ]\n    ]\n  }\n}\n```\n이렇게 expo-build-properties 패키지는 불필요한 패키지를 제거하고 asset 같은 리소스를 최적화 하여 빌드 용량을 줄여 배포 속도를 높여줍니다.","slug":"/post/expo-build-properties","readingMinutes":2,"wordCount":120,"category":"discover"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["discover","native"]},"buildId":"RAF__0Q2wTTeFz-NYIeWY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
