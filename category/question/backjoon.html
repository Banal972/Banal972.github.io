utton type="button"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M64 384h384v-42.67H64zm0-106.67h384v-42.66H64zM64 128v42.67h384V128z"></path></svg></button></div><main><h1 class="text-lg font-semibold"></h1><p class="mt-2 break-keep text-sm"></p><div class="mt-5 flex flex-wrap gap-3 text-xs"><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/">되돌아가기</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/blog">블로그</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/discover">TIL</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/question">코딩 테스트</a></div><div class="mt-5 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/backjoon-2309"><p class="break-keep">백준 - 난쟁이 풀이과정 (JavaScript)</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-27</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/backjoon-10818"><p class="break-keep">백준 - 최소최대 (JavaScript)</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-27</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/backjoon-1037"><p class="break-keep">백준 - 약수 구하기 (JavaScript)</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-27</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"백준 - 난쟁이 풀이과정 (JavaScript)","desc":"","thumbnail":"","tags":["backjoon"],"date":"2024-07-27","content":"\n### 개요\n\n코딩테스트를 공부하는겸 아는분들과 함께 코테 스터디를 만들어 3문제를 풀고 같이 풀이하는 시간을 가지게 되었습니다.\n\n그래서 백준 과 프로그래머스를 고민하다 백준으로 3문제를 먼저 풀어보기로 했고 그중에 일곱 난쟁이 문제를 풀이했던 방법을 서술해볼려고 합니다.\n\n### 문제\n\n왕비를 피해 일곱 난쟁이들과 함께 평화롭게 생활하고 있던 백설공주에게 위기가 찾아왔다. 일과를 마치고 돌아온 난쟁이가 일곱 명이 아닌 아홉 명이었던 것이다.\n\n아홉 명의 난쟁이는 모두 자신이 \"백설 공주와 일곱 난쟁이\"의 주인공이라고 주장했다. 뛰어난 수학적 직관력을 가지고 있던 백설공주는, 다행스럽게도 일곱 난쟁이의 키의 합이 100이 됨을 기억해 냈다.\n\n아홉 난쟁이의 키가 주어졌을 때, 백설공주를 도와 일곱 난쟁이를 찾는 프로그램을 작성하시오.\n\n### 입력\n\n아홉 개의 줄에 걸쳐 난쟁이들의 키가 주어진다. 주어지는 키는 100을 넘지 않는 자연수이며, 아홉 난쟁이의 키는 모두 다르며, 가능한 정답이 여러 가지인 경우에는 아무거나 출력한다.\n\n### 출력\n\n일곱 난쟁이의 키를 오름차순으로 출력한다. 일곱 난쟁이를 찾을 수 없는 경우는 없다.\n\n### 예제 입력\n\n```\n20\n7\n23\n19\n10\n15\n25\n8\n13\n```\n\n### 예제 출력\n\n```\n7\n8\n10\n13\n19\n20\n23\n```\n\n### 풀이과정\n\n```js\nconst get = [20, 7, 23, 19, 10, 15, 25, 8, 13];\n\nconst input = get.map(Number); // 가져온것을 숫자로 변환\n\nlet arr = [];\nconst total = input.reduce((a, b) =\u003e a + b, 0); // 0은 초기값 총값을 구하기\n\nfor (let i = 0; i \u003c input.length; i++) {\n  for (let j = i + 1; j \u003c input.length; j++) {\n    if (total - (input[i] + input[j]) === 100) {\n      // 총값에서 input의 있는거 순서대로 빼서 100이 되는지\n      arr = input.filter((_, index) =\u003e {\n        // i 와 j가 제거 되었을때 100이 된다는것이니 filter을 통해 i와 j를 제거 해서 배열로 변경\n        return index !== i \u0026\u0026 index !== j;\n      });\n    }\n  }\n}\n\n// 배열을 순서대로 수정하고 줄바꿈으로 출력\nconsole.log(arr.sort((a, b) =\u003e a - b).join(\"\\n\"));\n```\n\n저는 일단 입출력값을 number로 수정을 해주고\nreduce를 이용해서 총값을 구해줬습니다.\n또한 for문을 2번 중첩시켜 총값과 반복문으로 계산한 값이을 빼서 100인지 아닌지를 체크하여\n100일 경우 arr에 가져온 input의 filter로 해당 index가 아닐경우 제외하고 arr에 넣어주고\nsort()로 순서대를 바꾼뒤 join()을 통해 문제를 해결 했습니다.\n\n\n### 후기\n\n코딩 테스트를 제대로 공부하기 시작한지 얼마 안됐고 알고리즘에 대해서 잘 파악을 하지 못하니 어려웠던점이 많았던것 같습니다.\n확실히 아직 지저분한 느낌이 들고 효율성이 매우 떨어진다는것을 깨달았습니다.\n앞으로 꾸준하게 코딩 테스트 문제를 풀어서 익숙해지게 만들고 점점 난이도를 높여서 많이 풀어보는것을 목표로 할려고 합니다. 👍","slug":"/post/backjoon-2309","readingMinutes":5,"wordCount":377,"category":"question"},{"title":"백준 - 최소최대 (JavaScript)","desc":"","thumbnail":"","tags":["backjoon"],"date":"2024-07-27","content":"\n### 문제\nN개의 정수가 주어진다. 이때, 최솟값과 최댓값을 구하는 프로그램을 작성하시오.\n\n### 입력\n첫째 줄에 정수의 개수 N (1 ≤ N ≤ 1,000,000)이 주어진다. 둘째 줄에는 N개의 정수를 공백으로 구분해서 주어진다. 모든 정수는 -1,000,000보다 크거나 같고, 1,000,000보다 작거나 같은 정수이다.\n\n### 출력\n첫째 줄에 주어진 정수 N개의 최솟값과 최댓값을 공백으로 구분해 출력한다.\n\n### 풀이과정\n```\nconst fs = require(\"fs\");\nconst [n, input] = fs.readFileSync(\"/dev/stdin\").toString().trim().split(\"\\n\");\nconst inputArr = input.trim().split(\" \");\n\nconsole.log(\n  `${Math.min.apply(null, inputArr)} ${Math.max.apply(null, inputArr)}`\n);\n```\n이번 문제는 apply라는 메서드를 통해서 해당 배열의 가장 큰 수와 가장 작은 수를 가져와서 바로 출력 해줬습니다.","slug":"/post/backjoon-10818","readingMinutes":2,"wordCount":94,"category":"question"},{"title":"백준 - 약수 구하기 (JavaScript)","desc":"","thumbnail":"","tags":["backjoon"],"date":"2024-07-27","content":"\n### 문제\n어떤 자연수 p와 q가 있을 때, 만일 p를 q로 나누었을 때 나머지가 0이면 q는 p의 약수이다. \n\n6을 예로 들면\n- 6 ÷ 1 = 6 … 0\n- 6 ÷ 2 = 3 … 0\n- 6 ÷ 3 = 2 … 0\n- 6 ÷ 4 = 1 … 2\n- 6 ÷ 5 = 1 … 1\n- 6 ÷ 6 = 1 … 0\n\n그래서 6의 약수는 1, 2, 3, 6, 총 네 개이다.\n\n두 개의 자연수 N과 K가 주어졌을 때, N의 약수들 중 K번째로 작은 수를 출력하는 프로그램을 작성하시오.\n\n\n### 입력\n첫째 줄에 N과 K가 빈칸을 사이에 두고 주어진다. N은 1 이상 10,000 이하이다. K는 1 이상 N 이하이다.\n\n### 출력\n첫째 줄에 N의 약수들 중 K번째로 작은 수를 출력한다. 만일 N의 약수의 개수가 K개보다 적어서 K번째 약수가 존재하지 않을 경우에는 0을 출력하시오.\n\n### 풀이과정\n```js\nconst input = [6,3].map(Number); // 숫자열로 변환\n\nconst measure = [];\n\nfor (let i = 1; i \u003c= input[0]; i++) {\n  if (input[0] % i === 0) {\n    measure.push(i);\n  }\n}\n\nif (measure.length \u003c input[1]) {\n  console.log(0);\n} else {\n  console.log(measure[input[1] - 1]);\n}\n```\n입력값을 number로 변환해주고 for문을 사용해 약수를 구하였습니다.\n\n또한 if문을 통해 N의 약수의 개수가 K보다 적어서 K번째에 약수가 존재하지 않으면 0을 출력되게 해주었고\n\n아닐경우 K번째로 작은 수를 출력하게 해주었습니다.\n\n\n### 후기\n이번 문제는 확실히 많이 쉬웠던 문제였습니다. \n문제도 많이 어렵지 않고 코드도 조금 더 줄일 수 있을것 같지만 만족했던 문제였었습니다.","slug":"/post/backjoon-1037","readingMinutes":3,"wordCount":237,"category":"question"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["question","backjoon"]},"buildId":"wMXNuEISwK9Jz7eThPruh","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
