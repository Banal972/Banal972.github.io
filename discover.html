" defer=""></script><script src="/_next/static/412urwzzAAAeQBzln35YK/_ssgManifest.js" defer=""></script></head><body class="mx-auto max-w-2xl bg-[#fafaea] px-3 py-10 md:px-5 md:py-20"><div id="__next"><div class="__className_3aee0a"><main><h1 class="text-lg font-semibold">지식창고</h1><p class="mt-5 text-sm">프로젝트를 진행하면서 새로운 지식을 얻은것을 정리하는 곳 입니다.</p><div class="mt-1 flex flex-wrap gap-3 text-sm"><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/">되돌아가기</a><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/blog">블로그</a><a class="rounded-lg bg-[#d7d780] px-2 py-[2px] font-bold text-black transition-colors hover:bg-[#a3a362]" href="/question">코딩 테스트</a></div><div class="mt-10 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/functional-programming-0912">함수형 프로그래밍의 입문기</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-09-12</p></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/typescript-utils">필수인 타입스크립트 유틸리티 타입</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-09-05</p></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/dallem01">RSC에 async를 붙일때 Jest 오류 해결</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-26</p></li></ul></div><div class="mt-10 flex gap-5 border-t py-5"><p>2023</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-3 flex flex-wrap items-center justify-between gap-2 first:mt-0"><a href="/post/http-methods">HTTP 메서드에 대해서</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2023-12-22</p></li></ul></div></main></div></div><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"함수형 프로그래밍의 입문기","desc":"","thumbnail":"","tags":["지식창고"],"date":"2024-09-12","content":"\n### 함수형 프로그래밍 이란?\n함수형 프로그래밍은 도대체 무엇일까?\n위키피디아에 나오는것을 보면 수학 함수를 사용하고 side effect를 피하는 것이 특징인 프로그래밍 패터다임이라고 나와 있고\nside effect 없이 순수 함수만 사용하는 프로그래밍 스타일 이라고 보면 됩니다.\n\n\n\u003e **Side Effect란?**\n  함수나 표현식이 자신의 스코프 외부에 있는 상태를 변경하거나 관찰 가능한 상호작용을 하는 것을 의미 합니다.\n\n\u003e **순수 함수란?**\n  인자에만 의존하고 side effect가 없는 함수를 의미 합니다.\n\n\n### 함수형 프로그래밍을 사용하는 이유?\n- 코드의 가독성과 유지보수성 향상\n  - 순수 함수를 사용하여 side effect를 줄이고 예측 가능한 코드를 작성합니다.\n- 테스트와 디버깅 용이성\n  - 함수의 입출력이 명확하여 단위 테스트가 쉬움\n- 불변성\n  - 함수 외부에서의 데이터를 수정하지 않습니다.\n- 고참 함수\n\n이것이 대표적인것 같습니다.\n\n\n### 자바스크립트의 함수 프로그래밍\n\n간단하게 자바스크립트에서 짝수를 구하는 코드를 보면\n\n```js\n// 명령형\n\nconst arr = [1, 2, 3, 4, 5, 6];\n\nconst even = [];\n\nfor (let i = 0; i \u003c arr.length; i++) {\n  if (arr[i] % 2 === 0) {\n    even.push(arr[i]);\n  }\n}\n\n```\n\n이렇게 명령형의 코드를\n\n```js\n// 함수형\nconst arr = [1, 2, 3, 4, 5, 6];\nconst even = arr.filter((num) =\u003e num % 2 === 0);\n```\n\n이렇게 함수형으로 작성할 수 있습니다.\n이렇게 작성이 될 경우 side effect를 없애고 예측 가능성이 높고 테스트하기 쉬운 코드를 작성 할 수 있습니다.\n","slug":"/post/functional-programming-0912","readingMinutes":3,"wordCount":206},{"title":"필수인 타입스크립트 유틸리티 타입","desc":"","thumbnail":"","tags":["지식창고"],"date":"2024-09-05","content":"\n### 유틸리티 타입?\n기초의 타입스크립트만 배우다보면 타입정리가 하나도 되어있지 않거나 지저분한것을 많이 느낄수 있을겁니다.\n이러면 나중에 타입을 확인하기 어렵고 까다로우며 에러만 사라지면 되는 느낌으로 타입을 작성하는 자신을 볼 수 있습니다.\n\n이러한 고충을 해결하기 위해서 나온것이 타입스크립트의 유틸리티 타입 입니다.\n\n오늘은 여러 많은 유틸리티 타입중에 자주 사용하거나 개인적으로 많이 사용하는것을 위주로 작성해볼려고 합니다.\n\n\u003cbr/\u003e\n\n### Partial\nPartial은 객체의 모든 프로퍼티를 선택적(optional)으로 할 수 있게 만듭니다.\n\n기본적으로\n```jsx\ntype Partial\u003cT\u003e = {\n    [P in ketof T]? : T[P];\n}\n```\n이런식으로 선택적으로 변경한 새로운 타입을 생성하게 됩니다.\n\n**예시**\n```jsx \ninterface People {\n    age : number;\n    name : string   \n}\n\ntype MyAge = Partial\u003cPeople\u003e\n\nconst my1 : MyAge = {}\nconst my2 : MyAge = {age : 10}\nconst my3 : MyAge = {name : \"asdsad\",age: 5}\n\n```\n\n\u003cbr/\u003e\n\n### Omit\nOmit는 특정 속성만 제거한 타입을 정의합니다.\n\n```jsx\n\ninterface People {\n    age : number;\n    name : string   \n}\n\nconst age : Omit\u003cPeople,\"name\"\u003e = 0\n\n```\n\n\u003cbr/\u003e\n\n### Pick\nPick은 특정 속성만 가져옵니다. Omit의 반대라고 생각 하시면 됩니다.\n\n```jsx\n\ninterface People {\n    age : number;\n    name : string   \n}\n\nconst age : Pick\u003cPeople,\"age\"\u003e = 0\n\n```\n\n\n이렇게 제가 자주 사용하는 3가지의 유틸리티 함수를 소개 해드렸습니다.\n\n유틸리티 함수는 3가지를 제외하고 여러개 더 있기 때문에 본인에게 맞는 유틸리티 함수를 사용하면 될 것 같습니다.","slug":"/post/typescript-utils","readingMinutes":3,"wordCount":208},{"title":"RSC에 async를 붙일때 Jest 오류 해결","desc":"","thumbnail":"","tags":["지식창고"],"date":"2024-07-26","content":"\n## 문제 정의\nNext.js에서 Jest를 사용할때 RSC에 async를 붙일경우 에러가 발생하는 오류를 발견하였습니다.\n\n\nasync를 붙이기전\n```jsx\nexport default function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img01](/posts/dallem01/dallem01-01.png)\n\n\nasync 붙인후\n```jsx\nexport default async function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img02](/posts/dallem01/dallem01-02.png)\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 문제 원인\n찾아보니 이는 react-testing-library에서 RSC에 대한 지원을 하지 않기 때문에 발생하는 오류 였습니다.\n\n[NextJs 공식홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\n공식 홈페이지에도 현재 Jest는 이를 지원하지 않는다고 나옵니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 해결 방안\n\n의외로 간단한 해결방안이 있습니다.\n\n바로 render 에서 해당 컴포넌트를 불러올때 await을 붙여 함수형태로 불러오면 간단하게 해결이 됩니다.\n```jsx\nit(\"App Router: Works with Server Components\", async () =\u003e {\n  render(await Page());\n  expect(screen.getByRole(\"heading\")).toHaveTextContent(\"App Router\");\n});\n```\n\n\n단 async가 붙은 RSC 컴포넌트안에 또 async가 붙어있는 컴포넌트가 존재한다면 그것은 테스트 하기 힘들것 같습니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 그렇다면 이것은 좋은 방법일까?\n[NextJs 공식 홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\nNextJS의 공식 홈페이지에서는 해당 기능을 Jest에서 지원해주고 있지 않기 때문에 비동기 컴포넌트에서는 E2E 테스트를 사용하는 것을 권장한다고 나와 있습니다.\n\n어떤 테스트일지에 대해 고려해보고 해당 테스트를 돌리는것이 좋을것 같습니다.\n","slug":"/post/dallem01","readingMinutes":2,"wordCount":160}]],["2023",[{"title":"HTTP 메서드에 대해서","desc":"","thumbnail":"","tags":["지식창고"],"date":"2023-12-22","content":"\n### HTTP 메서드에 대해서\nHTTP 메서드는 웹브라우저(클라이언트) 와 웹 서버간의 이루어지는 요청(request)과 응답(response) 데이터를 전송하는 방식입니다.\n서버가 어떤 방식으로 동작할지 지정하는 요청(request)을 보내는 행동 이라고 보면 됩니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### HTTP 메서드의 종류\nHTTP 메서드는 총 9가지를 가지고 있는데 그중에서 5개를 자주 사용합니다.\n오늘은 자주 사용하는 메서드 들에서 알아볼려고 합니다.\n\n\u003cbr/\u003e\n\n**자주 사용하는 메서드**\n- GET : 리소스 조회\n- POST : 데이터 추가 및 등록\n- PUT : 리소스 덮어쓰기, 없으면 생성\n- PATCH : 리소스 일부 수정\n- DELETE : 리소스 삭제\n\n\u003cbr/\u003e\n\n**그외 메서드**\n- HEAD : GET와 같은 동작을 하지만 body부분을 제외\n- CONNECT : 리소스로 식별되는 터널을 맺음\n- OPTIONS : 리소스의 통신을 설정 할때 사용\n- TRACE : 리소스의 경로를 따라 look-back 테스트\n\n\n\u003cbr/\u003e\n\u003chr/\u003e\n\n### GET\nGET는 특정한 리소스를 가져올때 사용됩니다.\n\nGET 요청은 멱등성을 지니고 있습니다.\n\n\u003cdiv style={{backgroundColor : \"#fff\", padding : 12, border : \"1px solid #ddd\", fontSize : 14}}\u003e***멱등성***\n멱등성은 동일한 요청을 한 번 보내는 것과 여러 번 연속으로 보내는 것이 같은 효과를 지니고, 서버의 상태도 동일하게 남은 상태를 의미 합니다.\u003c/div\u003e\n\nGET요청으로 서버에게 데이터를 전달할 경우엔 쿼리스트링을 사용합니다.\n\n예를 들어 구글에 검색을 할경우\n![240903-014045](/posts/http-methods/240903-014045.png)\n\nsearch?q=%EA%B2\n이렇게 들어가는것을 볼수있을겁니다.\n\n이부분이 쿼리스트링입니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### POST\nPOST는 서버로 데이터를 전송합니다.\nPOST 요청은 HTML 양식을 통해서 서버에 전송하고, 서버에 변경사항을 만들어줍니다.\nbody를 통해 서버로 요청 데이터를 전달해줍니다.\n\nPOST는 멱등성을 지니지 않습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### PUT\nPUT은 새로운 리소스를 생성하거나, 대상 리소스를 대체합니다.\n\nPUT도 GET과 동일하게 멱등성을 지니고 있습니다.\n\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### PATCH\nPATCH는 리소스의 부분적인 수정을 할때 사용합니다.\n대부분 PUT과 PATCH를 자주 헷갈려하는데 PUT는 전체를 바꾸고 PATCH는 부분을 바꾼다고 생각하면 편합니다.\n\nPATCH는 기본적으로 멱등성을 가지지 않는데 PUT과 같은 방식으로 사용하게되면 멱등성을 지니게도 할 수 있습니다.\n\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### DELETE\nDELETE는 이름처럼 리소스를 삭제할때 사용합니다.\n\nDELETE도 멱등성을 가지고 있습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 정리\nHTTP 메서드 자체에는 기능을 가지고 있습니다. \n개발자가 해당 메서드를 이용해서 동작을 구현해줘야합니다.\n\n그렇다면 왜 HTTP 메서드가 존재하냐면 리소스와 행위를 분리하기 위해서 사용하는것 입니다.\nURL에 해당 행위를 지정해서 보내는것 보다\n\n- /read-card-list\n\nHTTP 메서드를 이용해서 구분하게끔 설계해서 유지보수하기 편하게 작성하는것 입니다.\n\n- /card GET","slug":"/post/http-methods","readingMinutes":5,"wordCount":332}]]]},"__N_SSG":true},"page":"/discover","query":{},"buildId":"412urwzzAAAeQBzln35YK","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
