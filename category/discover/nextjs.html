on">코딩 테스트</a></div><div class="mt-5 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-5 transition-colors first:mt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/dallem01"><p class="break-keep">RSC에 async를 붙일때 Jest 오류 해결</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-26</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-5 transition-colors first:mt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/next-toast-ui"><p class="break-keep">Next.js에서 Toast ui 에디터 사용하는법</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-05-24</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"RSC에 async를 붙일때 Jest 오류 해결","desc":"","thumbnail":"","tags":["nextjs"],"date":"2024-07-26","content":"\n## 문제 정의\nNext.js에서 Jest를 사용할때 RSC에 async를 붙일경우 에러가 발생하는 오류를 발견하였습니다.\n\n\nasync를 붙이기전\n```jsx\nexport default function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img01](/posts/dallem01/dallem01-01.png)\n\n\nasync 붙인후\n```jsx\nexport default async function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img02](/posts/dallem01/dallem01-02.png)\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 문제 원인\n찾아보니 이는 react-testing-library에서 RSC에 대한 지원을 하지 않기 때문에 발생하는 오류 였습니다.\n\n[NextJs 공식홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\n공식 홈페이지에도 현재 Jest는 이를 지원하지 않는다고 나옵니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 해결 방안\n\n의외로 간단한 해결방안이 있습니다.\n\n바로 render 에서 해당 컴포넌트를 불러올때 await을 붙여 함수형태로 불러오면 간단하게 해결이 됩니다.\n```jsx\nit(\"App Router: Works with Server Components\", async () =\u003e {\n  render(await Page());\n  expect(screen.getByRole(\"heading\")).toHaveTextContent(\"App Router\");\n});\n```\n\n\n단 async가 붙은 RSC 컴포넌트안에 또 async가 붙어있는 컴포넌트가 존재한다면 그것은 테스트 하기 힘들것 같습니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 그렇다면 이것은 좋은 방법일까?\n[NextJs 공식 홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\nNextJS의 공식 홈페이지에서는 해당 기능을 Jest에서 지원해주고 있지 않기 때문에 비동기 컴포넌트에서는 E2E 테스트를 사용하는 것을 권장한다고 나와 있습니다.\n\n어떤 테스트일지에 대해 고려해보고 해당 테스트를 돌리는것이 좋을것 같습니다.\n","slug":"/post/dallem01","readingMinutes":2,"wordCount":160,"category":"discover"},{"title":"Next.js에서 Toast ui 에디터 사용하는법","desc":"","thumbnail":"","tags":["nextjs"],"date":"2024-05-24","content":"\n### 개요\n\nNext.js 가장 최신인 14 버전을 사용했고 Toast ui는 @toast-ui/react-editor 3.2.3 버전을 사용했습니다.\n\n### Toast ui 설치하기\n\nNext.js로 모든 세팅이 끝난다는것을 가정하고 Toast ui를 설치하겠습니다.\n\n[https://www.npmjs.com/package/@toast-ui/react-editor](https://www.npmjs.com/package/@toast-ui/react-editor)\n해당 패키지를 사용해서 설치를 할 예정입니다.\n\n`npm i @toast-ui/react-editor`\n\nnpm을 통해 @toast-ui/react-editor 패키지를 설치해주었습니다.\n\n설치를 할경우 오류가 저희들을 반겨줍니다.\n\n![240923-035447](/posts/next-toast-ui/240923-035447.png)\n\n해당 오류는 버전이 맞지 않아서 생긴 오류인데 @toast-ui/react-editor 와 react 버전이 맞지 않아서 발생하는 오류 입니다.\n\n이럴때 사용할수 있는 방법이 2가지 존재하는데.\n\n`npm i @toast-ui/react-editor --force`\n\n커맨드에 --force을 붙이거나\n\n`npm i @toast-ui/react-editor --legacy-peer-deps`\n\n커맨드에 --legacy-peer-deps을 붙여주는겁니다.\n\n2개의 차이점은\n\n\\--force 는 필요한경우 패키지의 의존성을 위해 추가적인 패키지를 설치해서 충돌을 우회합니다.\n\n\\--legacy-peer-deps 는 그냥 충돌을 무시하고 설치해줍니다.\n\n저같은 경우는 --force로 설치해주었습니다.\n\n![240923-035525](/posts/next-toast-ui/240923-035525.png)\n\n그럼 문제없이 패키지가 설치된것을 확인할수 있습니다.\n\n#### Toast ui 사용방법\n\n@toast-ui/react-editor는 대표적으로 2가지의 컴포넌트를 가지고 있습니다.\n\n**Editor** 와 **Viewer**\n\n**Editor**는 작성할수있는 에디터를 불러와주는 컴포넌트입니다.\n\nEditor 의 props는 Toast-ui의 참고하실수있습니다.\n\n대표적으로 height, initialEditType, toolbarItem등 여러가지가 존재합니다.\n\n```tsx\n\u003cEditor\n  height=\"100%\"\n  hideModeSwitch={true}\n  initialEditType=\"wysiwyg\"\n  toolbarItems={\n    [\n      ['heading', 'bold'],\n      ['ul', 'ol'],\n      ['code', 'codeblock'],\n    ]\n  }\n/\u003e\n```\n\n저는 이렇게 props을 전달해줬습니다.\n\n[https://nhn.github.io/tui.editor/latest/](https://nhn.github.io/tui.editor/latest/)\n\n여기서 여러가지 설정을 확인하실수 있고\n\n[https://github.com/nhn/tui.editor/blob/master/docs/ko/toolbar.md](https://github.com/nhn/tui.editor/blob/master/docs/ko/toolbar.md)\n\n툴바 같은경우 여기에 한국어로 잘 정리가 되어있습니다.\n\n![240923-035649](/posts/next-toast-ui/240923-035649.png)\n\n적용되었을경우 해당 화면처럼 나오게 됩니다.\n\n### 에디터에 작성한글을 HTML로 가져와서 서버에 요청을 보내봅시다\n\n```tsx\n  const editorRef = useRef\u003cEditor\u003e(null);\n  const [getContent, setGetContent] = useState(\"\");\n\n  const onSubmit : FormEventHandler\u003cHTMLFormElement\u003e = (event)=\u003e{\n    event.preventDefault();\n\n    const content = editorRef.current?.getInstance().getHTML();\n\n    setGetContent(content);\n\n  }\n\n  return (\n    \u003cmain className=\"h-screen flex flex-col gap-9 items-center justify-center\"\u003e\n      \u003cform onSubmit={onSubmit} className=\"text-center\"\u003e\n        \u003ch2 className=\"text-center text-2xl\"\u003eToast ui\u003c/h2\u003e\n        \u003cdiv className=\"bg-white h-[500px] w-[750px] mt-9 text-left\"\u003e\n          \u003cEditor\n            ref={editorRef}\n            height=\"100%\"\n            hideModeSwitch={true}\n            initialEditType=\"wysiwyg\"\n            initialValue=\" \"\n            toolbarItems={\n              [\n                ['heading', 'bold'],\n                ['ul', 'ol'],\n                ['code', 'codeblock'],\n              ]\n            }\n          /\u003e\n        \u003c/div\u003e\n        \u003cbutton type=\"submit\" className=\"text-base bg-black text-white py-2 px-5 rounded-full mt-9\"\u003e서버에 전달\u003c/button\u003e\n      \u003c/form\u003e\n      \u003cp\u003e출력된 HTML\u003c/p\u003e\n      {getContent}\n    \u003c/main\u003e\n  );\n```\n\nref을 이용해서 Editor을 가져와주고 getInstance() 을 사용해서 Editor의 인스턴스를 가져옵니다.\n\n해당 인스턴스에는 여러가지 메서드들이 존재하는데 그 중 getHTML() 을 사용하면 작성한 내용을 html로 가져와줍니다.\n\n![240923-035709](/posts/next-toast-ui/240923-035709.png)\n\n이렇게 작성한 내용이 HTML 문법으로 변환된것을 볼수있습니다.\n\n이것을 DB에 저장을 하거나 사용하시는 상태관리 라이브러리를 사용하면 되겠죠?\n\n저는 화면에 보여주기 위해서 잠시 state을 이용해서 화면에 출력해줬습니다.\n\n### Viewer로 작성한 내용 가져오기\n\nViewer는 그냥 Editor의 내용을 그대로 가져오는것뿐입니다.\n\n```tsx\n\u003cdiv className=\"mt-28\"\u003e\n    \u003ch2 className=\"text-center text-2xl\"\u003eToast ui - Viewer\u003c/h2\u003e\n    \u003cdiv className=\"bg-white h-[500px] w-[750px] mt-9 text-left border border-[#ddd]\"\u003e\n      \u003cViewer\n        height=\"100%\"\n      /\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n![240923-035729](/posts/next-toast-ui/240923-035729.png)\n\n이렇게 View가 들어갈 부분을 만들어주고 initialValue을 통해 가져온 데이터를 넣어주면 끝입니다.\n\n```tsx\n\u003cdiv className=\"mt-28\"\u003e\n    \u003ch2 className=\"text-center text-2xl\"\u003eToast ui - Viewer\u003c/h2\u003e\n    \u003cdiv className=\"bg-white h-[500px] w-[750px] mt-9 text-left border border-[#ddd]\"\u003e\n      \u003cViewer\n        height=\"100%\"\n        initialValue={getContent}\n      /\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n근데 어째서인지 처음 접속할때 가져오는건 문제가 없지만 페이지가 이동되거나 content 내용을 변경했을때 재랜더링이 되지 않는 문제가 있어 initialValue 말고 다른 방법을 넣는게 좋을것 같습니다.\n\n이럴때 사용할것이 Editor와 동일하게 ref을 이용해서 인스턴스를 가져와줍니다.\n\n그리고 setMarkdown()을 이용해서 HTML을 넣어주면 됩니다.\n\n```tsx\nuseEffect(()=\u003e{\n    viewerRef.current?.getInstance().setMarkdown(getContent);\n},[getContent])\n\n\u003cdiv className=\"mt-28\"\u003e\n    \u003ch2 className=\"text-center text-2xl\"\u003eToast ui - Viewer\u003c/h2\u003e\n    \u003cdiv className=\"bg-white h-[500px] w-[750px] mt-9 text-left border border-[#ddd]\"\u003e\n      \u003cViewer\n        ref={viewerRef}\n        height=\"100%\"\n        initialValue={getContent}\n      /\u003e\n    \u003c/div\u003e\n\u003c/div\u003e\n```\n\n![240923-035751](/posts/next-toast-ui/240923-035751.png)\n\n그러면 이렇게 Editor에 넣은 내용이\n\n![240923-035806](/posts/next-toast-ui/240923-035806.png)\n\nViewer에 그대로 적용되는것을 볼수 있습니다.\n\n참고자료\n\n[https://nhn.github.io/tui.editor/latest/](https://nhn.github.io/tui.editor/latest/)\n[https://www.npmjs.com/package/@toast-ui/react-editor](https://www.npmjs.com/package/@toast-ui/react-editor)\n[https://github.com/nhn/tui.editor](https://github.com/nhn/tui.editor)\n","slug":"/post/next-toast-ui","readingMinutes":6,"wordCount":476,"category":"discover"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["discover","nextjs"]},"buildId":"RAF__0Q2wTTeFz-NYIeWY","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
