utton type="button"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M64 384h384v-42.67H64zm0-106.67h384v-42.66H64zM64 128v42.67h384V128z"></path></svg></button></div><main><h1 class="text-lg font-semibold"></h1><p class="mt-2 break-keep text-sm"></p><div class="mt-5 flex flex-wrap gap-3 text-xs"><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/">되돌아가기</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/blog">블로그</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/discover">TIL</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/question">코딩 테스트</a></div><div class="mt-5 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/programmers-12906"><p class="break-keep">프로그래머스 - 같은 숫자는 싫어</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-08-17</p></a></li><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/programmers-42576"><p class="break-keep">프로그래머스 - 완주하지 못한 선수</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-08-09</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"프로그래머스 - 같은 숫자는 싫어","desc":"","thumbnail":"","tags":["programmers"],"date":"2024-08-17","content":"\n### 문제\n배열 arr가 주어집니다. 배열 arr의 각 원소는 숫자 0부터 9까지로 이루어져 있습니다. 이때, 배열 arr에서 연속적으로 나타나는 숫자는 하나만 남기고 전부 제거하려고 합니다. 단, 제거된 후 남은 수들을 반환할 때는 배열 arr의 원소들의 순서를 유지해야 합니다. 예를 들면,\n\n- arr = [1, 1, 3, 3, 0, 1, 1] 이면 [1, 3, 0, 1] 을 return 합니다.\n- arr = [4, 4, 4, 3, 3] 이면 [4, 3] 을 return 합니다.\n\n배열 arr에서 연속적으로 나타나는 숫자는 제거하고 남은 수들을 return 하는 solution 함수를 완성해 주세요.\n\n### 제한사항\n- 배열 arr의 크기 : 1,000,000 이하의 자연수\n- 배열 arr의 원소의 크기 : 0보다 크거나 같고 9보다 작거나 같은 정수\n\n### 입출력 예\n| arr\t| answer |\n| --- | --- |\n| [1,1,3,3,0,1,1]\t| [1,3,0,1] |\n| [4,4,4,3,3]\t| [4,3] |\n\n\n### 풀이과정\n\n처음에 풀었던 방식\n```js\narr.reduce((ac, cur) =\u003e {\n  if (ac.length \u003e 0 \u0026\u0026 ac[ac.length - 1] === cur) return ac;\n  return [...ac, cur]; \n}, []);\n```\n해당 방식 같은 경우 테스트는 모두 통과를 했습니다.\n하지만 효율성에서는 테스트를 통과하지 못했는데\n이것은 시간 복잡도에 문제가 있었습니다. 빅오 표기법을 아신다면 O(1), O(n) 이런것을 아실텐데\nreduce와 스프레드 연산자를 동시에 사용 했기 때문에 O(n2)가 되어버려 속도가 느려 효율성에 통과를 하지 못했었습니다.\n\n\n시간 복잡도를 고쳐본 방식\n```js\nfunction solution(arr){\n    const answer = [];\n\n    for (let i = 0; i \u003c arr.length; i++) {\n      // O(n)\n      if (answer.length \u003e 0 \u0026\u0026 answer[answer.length - 1] === arr[i]) continue;\n      answer.push(arr[i]);\n    }\n    \n    return answer;\n}\n```\n\n저는 O(n2)가 아닌 O(n)이 될 수 있도록 for문으로 방식을 수정했고 효율성에 통과 할 수 있게 되었습니다.\n\n\n### 후기\n알고리즘 관련 강의를 들으면서 빅오 표기법에 대해서 배웠는데 바로 해당 문제에 시간 복잡도, 공간 복잡도와 관련되어서 문제가 발생해서 바로 이해하고 풀수 있는 시간이 되었습니다.\n알고리즘 강의에 돈을 쓴것을 후회 하지 않는것 같아요!👍","slug":"/post/programmers-12906","readingMinutes":3,"wordCount":291,"category":"question"},{"title":"프로그래머스 - 완주하지 못한 선수","desc":"","thumbnail":"","tags":["programmers"],"date":"2024-08-09","content":"\n#### 문제\n\n수많은 마라톤 선수들이 마라톤에 참여하였습니다. 단 한 명의 선수를 제외하고는 모든 선수가 마라톤을 완주하였습니다.\n\n마라톤에 참여한 선수들의 이름이 담긴 배열 participant와 완주한 선수들의 이름이 담긴 배열 completion이 주어질 때, 완주하지 못한 선수의 이름을 return 하도록 solution 함수를 작성해주세요.\n\n#### 제한사항\n- 마라톤 경기에 참여한 선수의 수는 1명 이상 100,000명 이하입니다.\n- completion의 길이는 participant의 길이보다 1 작습니다.\n- 참가자의 이름은 1개 이상 20개 이하의 알파벳 소문자로 이루어져 있습니다.\n- 참가자 중에는 동명이인이 있을 수 있습니다.\n\n#### 풀이과정\n\n처음에는 forEach을 사용해서 문제를 풀었었습니다.\n```js\nconst answer = [...participant];\n\ncompletion.forEach((item) =\u003e {\n  const indexof = answer.indexOf(item);\n  if (indexof \u003e -1) answer.splice(indexof, 1);\n});\n\nreturn answer.toString();\n```\n\n이렇게 했을경우 해당 문제에 대한 답을 얻을수 있었지만\n효율성 테스트에서는 실패 하였습니다.\n\n효율성에 테스트 하지못한 이유는 시간 복잡도와 관련이 있었습니다.\n\nforEach는 O(n) 이고\nindexOf 또한 O(n),\nsplice 또한 O(n) 입니다.\n\n결국 전체 시간 복잡도는 O(n) * O(n) 이기 때문에 O(n^2)가 됩니다.\n\n그렇기 때문에 효율성을 통과하지 못하게 되었습니다.\n\n효율성을 통과하기 위해서 `Map`을 하용하게 되었고 해당 방법으로 효율성을 통과할 수 있게 되었습니다.\n\n\n```js\nconst map = new Map();\n\nfor (let value of participant) {\n  map.set(value, map.has(value) ? map.get(value) + 1 : 1);\n}\n\nfor (let value of completion) {\n  if (map.has(value)) {\n    map.set(value, map.get(value) - 1);\n  }\n}\n\nfor (let [key, value] of map) {\n  if (value === 1) {\n    answer = key;\n  }\n}\n\nreturn answer;\n```\n\n이 풀이 방법은 `participant`를 순회하면서 각 참가자의 이름을 가져옵니다.\n가져온 참가자의 이름을 `map.set()`을 이용해서 `map`안에 `value`가 존재하면 `value` 값에 `+1`을 해주고 없을경우 `1`을 저장하게 됩니다.\n\n`completion`는 완주한 사람을 순회해서 찾습니다.\n`map` 안에 `value`값이 존재할 경우 `map.set()`을 통해 `value`값에 `-1`을 넣어줍니다.\n\n이렇게 할경우 완주한 사람은 값이 `0`이 되고 완주를 못했을경우 `1`이 되게 됩니다.\n\n이제 마지막으로 `for of` 문을 통해 `map`의 `key` 와 `value`값을 가져와서 `value`값이 `1`일 경우 `key`값을 꺼내주면 완주하지 못한 사람을 찾을 수 있게 됩니다.","slug":"/post/programmers-42576","readingMinutes":4,"wordCount":298,"category":"question"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["question","programmers"]},"buildId":"BsGAOomFWk3RNbwqyKqq1","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
