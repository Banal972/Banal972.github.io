en gap-2 md:flex-row md:items-center" href="/post/typescript-utils"><p class="break-keep">필수인 타입스크립트 유틸리티 타입</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-09-05</p></a></li></ul></div><div class="mt-5 flex gap-5 border-t py-5"><p>2023</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/http-methods"><p class="break-keep">HTTP 메서드에 대해서</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2023-12-22</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"싱글턴 패턴 과 Zustand","desc":"","thumbnail":"","tags":["etc"],"date":"2024-09-12","content":"\n### 개요\n싱글턴 패턴을 구축하고 상태관리 라이브러리와 같이 사용하면서 메모리 사용을 줄이고 테스트와 성능 최적화를 하는것을 자주 사용하는것 같아\n싱글턴 패턴을 알아보고 구현과 zustand를 조합해서 컴포넌트 개발을 한번 해볼려고 합니다.\n\n\n### 싱글턴 패턴이란?\n싱글턴 패턴은 Class로 만든 인스턴스가 오직 하나만 생성되도록 만드는 디자인 패턴입니다.\n\n예를 한번 들어보겠습니다\n```js\nclass Person {\n  constructor(name, age) {\n    this.name = name;\n    this.age = age;\n  }\n  sayHello {\n    console.log(`안녕 나는 ${this.name} 이고 나이는 ${this.age}야`);\n  }\n}\n```\n라는 간단한 클래스가 있다고 있을때\n\n```js\nconst Person1 = new Person();\nconst Person2 = new Person();\n\nPerson1 === Person2; // false\n```\n이렇게 있을때 new를 이용해서 새로운 객체를 생성하기 때문에 서로 비교 했을경우 false이 나옵니다.\n하지만 싱글턴 패턴을 이용하면 항상 같은 객체가 나오게끔 할 수 있게 됩니다.\n\n만드는 방법은 굉장히 간단합니다.\n\n```js\nclass Person {\n  static instance;\n  constructor(name, age) {\n    if(Person.instance){\n      return Person.instance;\n    }\n    this.name = name;\n    this.age = age;\n    Person.instance = this;\n  }\n  sayHello {\n    console.log(`안녕 나는 ${this.name} 이고 나이는 ${this.age}야`);\n  }\n}\n```\n`instance` 속성을 만들어주고 `constructor`에 `Person.instance = this;` 를 넣어주게 되면 처음 `new Person()`을 하게 될때 `Person.instance` 안에 `this`가 들어가게 됩니다.\n그리고 조건문으로 `Person.instance`가 존재하면 `Person.instance`를 `return` 하게 해주면 항상 같은 인스턴스를 반환하게 됩니다.\n\n\n```js\nconst Person1 = new Person()\nconst Person2 = new Person()\n\nPerson1 === Person2 // true\n```\n\n이 방식을 싱글턴 패턴이라고 합니다.\n이것을 이용해서 싱글턴으로 `store`를 생성하고 `Zustand`와 조합 하는것을 작성해볼려고 합니다.\n\n\u003cbr/\u003e\n싱글턴으로 만든 store\n```js\nclass CounterState {\n  static instance;\n  constructor() {\n    if (!CounterState.instance) {\n      return CounterState.instance\n    }\n    this.state = {\n      count: 0,\n    };\n    CounterState.instance = this\n  }\n\n  reset() {\n    this.state.count = 0;\n  }\n\n  inc() {\n    this.state.count += 1;\n  }\n\n  dec() {\n    this.state.count -= 1;\n  }\n\n  getState() {\n    return this.state;\n  }\n}\n```\n\n주스탄드와 조합한 모습\n```js\nimport create from 'zustand';\n\nconst counterState = new CounterState();\n\nconst useCounter = create((set) =\u003e ({\n  ...counterState.getState(),\n  inc: () =\u003e {\n    counterState.inc();\n    set(counterState.getState());\n  },\n  dec: () =\u003e {\n    counterState.dec();\n    set(counterState.getState());\n  },\n  reset: () =\u003e {\n    counterState.reset();\n    set(counterState.getState());\n  },\n}));\n\nexport default useCounter;\n```\n\n이렇게 구현하게 되면 불필요한 메모리 사용을 방지할 수 있고 전역으로 접근하기 쉬워지며 일관성을 유지하고\n상속이 가능해지기 때문에 유연성이 높아지고 메모리 효율성이 좋아집니다.\n\n실무에서 이런 방식으로 구현을 한다는데 정말인지는 모르겠고 학습 용도로 작성해 보았습니다.","slug":"/post/singleton-pattern","readingMinutes":4,"wordCount":355,"category":"discover"},{"title":"필수인 타입스크립트 유틸리티 타입","desc":"","thumbnail":"","tags":["etc"],"date":"2024-09-05","content":"\n### 유틸리티 타입?\n기초의 타입스크립트만 배우다보면 타입정리가 하나도 되어있지 않거나 지저분한것을 많이 느낄수 있을겁니다.\n이러면 나중에 타입을 확인하기 어렵고 까다로우며 에러만 사라지면 되는 느낌으로 타입을 작성하는 자신을 볼 수 있습니다.\n\n이러한 고충을 해결하기 위해서 나온것이 타입스크립트의 유틸리티 타입 입니다.\n\n오늘은 여러 많은 유틸리티 타입중에 자주 사용하거나 개인적으로 많이 사용하는것을 위주로 작성해볼려고 합니다.\n\n\u003cbr/\u003e\n\n### Partial\nPartial은 객체의 모든 프로퍼티를 선택적(optional)으로 할 수 있게 만듭니다.\n\n기본적으로\n```jsx\ntype Partial\u003cT\u003e = {\n    [P in ketof T]? : T[P];\n}\n```\n이런식으로 선택적으로 변경한 새로운 타입을 생성하게 됩니다.\n\n**예시**\n```jsx \ninterface People {\n    age : number;\n    name : string   \n}\n\ntype MyAge = Partial\u003cPeople\u003e\n\nconst my1 : MyAge = {}\nconst my2 : MyAge = {age : 10}\nconst my3 : MyAge = {name : \"asdsad\",age: 5}\n\n```\n\n\u003cbr/\u003e\n\n### Omit\nOmit는 특정 속성만 제거한 타입을 정의합니다.\n\n```jsx\n\ninterface People {\n    age : number;\n    name : string   \n}\n\nconst age : Omit\u003cPeople,\"name\"\u003e = 0\n\n```\n\n\u003cbr/\u003e\n\n### Pick\nPick은 특정 속성만 가져옵니다. Omit의 반대라고 생각 하시면 됩니다.\n\n```jsx\n\ninterface People {\n    age : number;\n    name : string   \n}\n\nconst age : Pick\u003cPeople,\"age\"\u003e = 0\n\n```\n\n\n이렇게 제가 자주 사용하는 3가지의 유틸리티 함수를 소개 해드렸습니다.\n\n유틸리티 함수는 3가지를 제외하고 여러개 더 있기 때문에 본인에게 맞는 유틸리티 함수를 사용하면 될 것 같습니다.","slug":"/post/typescript-utils","readingMinutes":3,"wordCount":208,"category":"discover"}]],["2023",[{"title":"HTTP 메서드에 대해서","desc":"","thumbnail":"","tags":["etc"],"date":"2023-12-22","content":"\n### HTTP 메서드에 대해서\nHTTP 메서드는 웹브라우저(클라이언트) 와 웹 서버간의 이루어지는 요청(request)과 응답(response) 데이터를 전송하는 방식입니다.\n서버가 어떤 방식으로 동작할지 지정하는 요청(request)을 보내는 행동 이라고 보면 됩니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### HTTP 메서드의 종류\nHTTP 메서드는 총 9가지를 가지고 있는데 그중에서 5개를 자주 사용합니다.\n오늘은 자주 사용하는 메서드 들에서 알아볼려고 합니다.\n\n\u003cbr/\u003e\n\n**자주 사용하는 메서드**\n- GET : 리소스 조회\n- POST : 데이터 추가 및 등록\n- PUT : 리소스 덮어쓰기, 없으면 생성\n- PATCH : 리소스 일부 수정\n- DELETE : 리소스 삭제\n\n\u003cbr/\u003e\n\n**그외 메서드**\n- HEAD : GET와 같은 동작을 하지만 body부분을 제외\n- CONNECT : 리소스로 식별되는 터널을 맺음\n- OPTIONS : 리소스의 통신을 설정 할때 사용\n- TRACE : 리소스의 경로를 따라 look-back 테스트\n\n\n\u003cbr/\u003e\n\u003chr/\u003e\n\n### GET\nGET는 특정한 리소스를 가져올때 사용됩니다.\n\nGET 요청은 멱등성을 지니고 있습니다.\n\n\u003cdiv style={{backgroundColor : \"#fff\", padding : 12, border : \"1px solid #ddd\", fontSize : 14}}\u003e***멱등성***\n멱등성은 동일한 요청을 한 번 보내는 것과 여러 번 연속으로 보내는 것이 같은 효과를 지니고, 서버의 상태도 동일하게 남은 상태를 의미 합니다.\u003c/div\u003e\n\nGET요청으로 서버에게 데이터를 전달할 경우엔 쿼리스트링을 사용합니다.\n\n예를 들어 구글에 검색을 할경우\n![240903-014045](/posts/http-methods/240903-014045.png)\n\nsearch?q=%EA%B2\n이렇게 들어가는것을 볼수있을겁니다.\n\n이부분이 쿼리스트링입니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### POST\nPOST는 서버로 데이터를 전송합니다.\nPOST 요청은 HTML 양식을 통해서 서버에 전송하고, 서버에 변경사항을 만들어줍니다.\nbody를 통해 서버로 요청 데이터를 전달해줍니다.\n\nPOST는 멱등성을 지니지 않습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### PUT\nPUT은 새로운 리소스를 생성하거나, 대상 리소스를 대체합니다.\n\nPUT도 GET과 동일하게 멱등성을 지니고 있습니다.\n\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### PATCH\nPATCH는 리소스의 부분적인 수정을 할때 사용합니다.\n대부분 PUT과 PATCH를 자주 헷갈려하는데 PUT는 전체를 바꾸고 PATCH는 부분을 바꾼다고 생각하면 편합니다.\n\nPATCH는 기본적으로 멱등성을 가지지 않는데 PUT과 같은 방식으로 사용하게되면 멱등성을 지니게도 할 수 있습니다.\n\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### DELETE\nDELETE는 이름처럼 리소스를 삭제할때 사용합니다.\n\nDELETE도 멱등성을 가지고 있습니다.\n\n\u003cbr/\u003e\n\u003cbr/\u003e\n\n### 정리\nHTTP 메서드 자체에는 기능을 가지고 있습니다. \n개발자가 해당 메서드를 이용해서 동작을 구현해줘야합니다.\n\n그렇다면 왜 HTTP 메서드가 존재하냐면 리소스와 행위를 분리하기 위해서 사용하는것 입니다.\nURL에 해당 행위를 지정해서 보내는것 보다\n\n- /read-card-list\n\nHTTP 메서드를 이용해서 구분하게끔 설계해서 유지보수하기 편하게 작성하는것 입니다.\n\n- /card GET","slug":"/post/http-methods","readingMinutes":5,"wordCount":332,"category":"discover"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["discover","etc"]},"buildId":"5NLUDSMRPFVIqTgEDqrlH","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
