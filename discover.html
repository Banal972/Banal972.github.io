f="/question">코딩 테스트</a></div><div class="mt-10 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li class="mt-3 flex items-center justify-between first:mt-0"><a href="/post/cypess-jest">Cypress 와 Jest 같이 사용하는 방법 작성중</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-08-14</p></li><li class="mt-3 flex items-center justify-between first:mt-0"><a href="/post/dallem01">RSC에 async를 붙일때 Jest 오류 해결</a><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-07-26</p></li></ul></div></main></div></div><footer class="mt-40 text-center text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"Cypress 와 Jest 같이 사용하는 방법 작성중","desc":"Cypress 와 Jest 같이 사용하기","thumbnail":"","tags":["지식창고"],"date":"2024-08-14","content":"\n## 개요\n코드잇 단기 심화에서 프로젝트를 진행하다가 Jest와 Cypress를 같이 사용해야 되는 일이 발생했습니다.\nJest를 사용하다가 Cypress를 설치해서 사용하다 보면 해당 오류가 나타나는것을 볼 수 있습니다.\n```jsx\n.toBeInTheDocument() // 'toBeInTheDocument' does not exist on type 'Assertion'\n```\n해당 오류는 타입에 관련된 오류고 사실 테스트를 실행하면 오류가 발생하지는 않습니다.\n하지만 빨간줄은 항상 거슬리고 진짜 오류인지 아닌지 헷갈리게 만듭니다.\n그래서 해결방법을 찾아보고 해결방안을 찾았습니다.\n\n\n## 해결방법\n\n","slug":"/post/cypess-jest/","readingMinutes":1,"wordCount":66},{"title":"RSC에 async를 붙일때 Jest 오류 해결","desc":"","thumbnail":"","tags":["지식창고"],"date":"2024-07-26","content":"\n## 문제 정의\nNext.js에서 Jest를 사용할때 RSC에 async를 붙일경우 에러가 발생하는 오류를 발견하였습니다.\n\n\nasync를 붙이기전\n```jsx\nexport default function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img01](/posts/dallem01/dallem01-01.png)\n\n\nasync 붙인후\n```jsx\nexport default async function Page() {\n  return \u003ch1\u003eApp Router\u003c/h1\u003e;\n}\n```\n![img02](/posts/dallem01/dallem01-02.png)\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 문제 원인\n찾아보니 이는 react-testing-library에서 RSC에 대한 지원을 하지 않기 때문에 발생하는 오류 였습니다.\n\n[NextJs 공식홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\n공식 홈페이지에도 현재 Jest는 이를 지원하지 않는다고 나옵니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 해결 방안\n\n의외로 간단한 해결방안이 있습니다.\n\n바로 render 에서 해당 컴포넌트를 불러올때 await을 붙여 함수형태로 불러오면 간단하게 해결이 됩니다.\n```jsx\nit(\"App Router: Works with Server Components\", async () =\u003e {\n  render(await Page());\n  expect(screen.getByRole(\"heading\")).toHaveTextContent(\"App Router\");\n});\n```\n\n\n단 async가 붙은 RSC 컴포넌트안에 또 async가 붙어있는 컴포넌트가 존재한다면 그것은 테스트 하기 힘들것 같습니다.\n\n\u003cbr/\u003e\u003cbr/\u003e\n\n## 그렇다면 이것은 좋은 방법일까?\n[NextJs 공식 홈페이지](https://nextjs.org/docs/app/building-your-application/testing/jest)\n\nNextJS의 공식 홈페이지에서는 해당 기능을 Jest에서 지원해주고 있지 않기 때문에 비동기 컴포넌트에서는 E2E 테스트를 사용하는 것을 권장한다고 나와 있습니다.\n\n어떤 테스트일지에 대해 고려해보고 해당 테스트를 돌리는것이 좋을것 같습니다.\n","slug":"/post/dallem01/","readingMinutes":2,"wordCount":160}]]]},"__N_SSG":true},"page":"/discover","query":{},"buildId":"j_a1SE4hz6J45uleYmN85","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
