utton type="button"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M64 384h384v-42.67H64zm0-106.67h384v-42.66H64zM64 128v42.67h384V128z"></path></svg></button></div><main><h1 class="text-lg font-semibold"></h1><p class="mt-2 break-keep text-sm"></p><div class="mt-5 flex flex-wrap gap-3 text-xs"><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/">되돌아가기</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/blog">블로그</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/discover">TIL</a><a class="rounded-lg bg-green-200 px-3 py-1 font-bold text-black transition-colors hover:bg-green-300" href="/category/question">코딩 테스트</a></div><div class="mt-5 flex gap-5 border-t py-5"><p>2024</p><ul class="flex-1"><li style="opacity:0;transform:translate3d(0,30px,0)" class="mt-2 border-t pt-2 transition-colors first:mt-0 first:border-0 first:pt-0 hover:text-green-400"><a class="flex flex-col flex-wrap justify-between gap-2 md:flex-row md:items-center" href="/post/geolocation-api"><p class="break-keep">Geolocation API을 이용해서 현재 위치를 가져와보자</p><p class="flex items-center gap-1 text-sm text-gray-500"><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 512 512" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect width="416" height="384" x="48" y="80" fill="none" stroke-linejoin="round" stroke-width="32" rx="48"></rect><path fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="32" d="M128 48v32m256-32v32m80 80H48"></path></svg>2024-04-15</p></a></li></ul></div></main><footer class="mt-40 text-center text-sm text-gray-600">@ 2024. <span class="font-bold text-black">Banal</span> All Rights Reserved.</footer></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"posts":[["2024",[{"title":"Geolocation API을 이용해서 현재 위치를 가져와보자","desc":"","thumbnail":"","tags":["react"],"date":"2024-04-15","content":"\n#### 개요\n\n최근 팀프로젝트를 진행하던 도중 카카오맵을 이용하다 현재위치를 가져와야 하는 상황이 발생했고\n\nGeolocation API을 통해 React에서 현재 위치를 가져올수 있었습니다.\n\nGeolocation API는 브라우저에서 지원해주는 웹 애플리케이션 위치 정보 API입니다.\n\n\u003cbr/\u003e\n\n#### 개념\n\nnavigator라는 프로퍼티 안에 geolocation을 사용하면 됩니다.\n\nnavigator.geolocation을 사용하게 되면 해당 사이트에 접속할 때\n\n![241019-041058](/posts/geolocation-api/241019-041058.png)\n\n이렇게 사용자에게 요청을 하게 됩니다.\n\n허용을 눌렀을 경우 사용할 수 있게 되는거죵\n\n\u003cbr/\u003e\n\n#### 사용법\n\n```\nconst [location,setLocation] = useState(); // 좌표를 넣어둘 state\nconst [err,setErr] = useState(); // 에러를 넣어둘 state\n\nuseEffect(()=\u003e{\n\n\tconst { geolocation } = navigator; // navigator의 geolocation을 가져옵니다.\n    \n    if(!geolocation){\n    \t// geolocation을 가져올수 없으면 에러를 보냅니다.\n        setErr({code : 0, message : \"오류가 발생했습니다.\"});\n    }\n    \n},[])\n```\n\nuseState()을 통해 좌표를 넣어둘 state와 err을 담아줄 state을 생성해 뒀습니다.\n\n사용자에게 위치정보를 가져올 건지 요청을 하는 부분입니다.\n\ngeolocation를 생성했을 경우 **getCurrentPosition()과** **watchPostion()**을 사용할 수 있습니다.\n\n**getCurrentPosition()**는 현재위치를 가져올 때 사용하는 함수입니다.\n\n**watchPostion()**는 위치가 변동되었을 때 자동으로 위치를 반환해 주는 함수입니다.\n\n지금은 **getCurrentPosition()**만 사용해 볼 예정입니다.\n\n\u003cbr/\u003e\n\n#### getCurrentPosition()\n\n```\n  useEffect(() =\u003e {\n    const { geolocation } = navigator; // navigator의 geolocation을 가져옵니다.\n\n    if (!geolocation) {\n      // geolocation 을 가져올수 없으면 에러를 보냅니다.\n      setErr({ code: 0, message: \"오류가 발생했습니다.\" });\n    }\n\n    /*\n      geolocation의 getCurrentPosition함수를 통해 현재위치를 가져옵니다.\n      getCurrentPosition는 argument가 총 3개가 들어갑니다.\n      getCurrentPosition(성공,실패,옵션);\n    */\n    geolocation.getCurrentPosition(성공함수, 실패함수, 옵션);\n  }, []);\n```\n\n**getCurrentPosition**()는 3개의 인자(argument)를 전달할 수 있습니다.\n\n성공함수는 **getCurrentPosition**을 성공적으로 잘 가져왔을 때를 작성하며\n\n실패함수는 **getCurrentPosition**을 가져오는데 실패하거나 오류가 발생했을 때 작성합니다.\n\n옵션은 **getCurrentPosition**의 방식을 넣어줄 수 있습니다.\n\n\u003cbr/\u003e\n\n#### 성공함수\n\n```\nfunction 성공함수(pos) {\n    /*\n    성공했을때 반환되는 값은 총 2개 입니다.\n    위치를 저장하고 있는 coords\n    위치가 검색된 시간을 나타내는 timestamp\n  */\n    const { coords } = pos;\n    setLocation(coords);\n}\n```\n\n성공함수는 위치정보가 담긴 매개변수(**parameter**)를 받아올 수 있습니다.\n\n매개변수는 총 2개를 반환해 주는데 위치 좌표를 저장하고 있는 **coords**, 위치가 검색된 시간을 나타내주는 **timestamp입니다.**\n\n#### 실패함수\n\n```\nfunction 실패함수(error) {\n    /*\n      에러가 발생했을때는 code 값 과 message을 반환해줍니다.\n      code는 오류 코드를 반환합니다.\n      예를 들어 1은 페이지에 권한이 없는것\n      https://developer.mozilla.org/en-US/docs/Web/API/GeolocationPositionError/code 에러코드는 이곳에 정리가 되어있습니다.\n      message는 사용자가 알아보기 쉽게 문자열로 나타내줍니다.\n    */\n    setErr(error);\n}\n```\n\n실패함수는 에러정보가 담긴 매개변수(**parameter**)를 받아올 수 있습니다.\n\n매개변수는 **code와** **message**을 반환해줍니다.\n\n**code**는 오류 코드를 반환해 주며  \n예를 들어 1은 해당 웹애플리케이션에 권한이 없을 때 발생합니다.\n\n**message**는 사용자가 알아보기 쉽게 문자열로 나타내줍니다.\n\n\u003cbr/\u003e\n\n#### 적용해 보기\n\n```\nexport default function App() {\n\n\tconst [location, setLocation] = useState();\n  \tconst [err, setErr] = useState();\n    \n    function 성공함수(pos: GeolocationPosition) {\n    \t/*\n        \t성공했을때 반환되는 값은 총 2개 입니다.\n        \t위치를 저장하고 있는 coords\n        \t위치가 검색된 시간을 나타내는 timestamp\n      \t*/\n        const { coords } = pos;\n        setLocation(coords);\n  \t}\n    \n  \tfunction 실패함수(error: GeolocationPositionError) {\n    \t/*\n      \t\t에러가 발생했을때는 code 값 과 message을 반환해줍니다.\n      \t\tcode는 오류 코드를 반환합니다.\n      \t\t예를 들어 1은 페이지에 권한이 없는것\n          \thttps://developer.mozilla.org/en-US/docs/Web/API/GeolocationPositionError/code 에러코드는 이곳에 정리가 되어있습니다.\n          \tmessage는 사용자가 알아보기 쉽게 문자열로 나타내줍니다.\n    \t*/\n        setErr(error);\n  \t}\n    \n    useEffect(()=\u003e{\n        const { geolocation } = navigator; // navigator의 geolocation을 가져옵니다.\n\n        if (!geolocation) {\n          // geolocation 을 가져올수 없으면 에러를 보냅니다.\n          setErr({ code: 0, message: \"오류가 발생했습니다.\" });\n        }\n\n        /*\n          \tgeolocation의 getCurrentPosition함수를 통해 현재위치를 가져옵니다.\n          \tgetCurrentPosition는 매개변수가 총 3개가 들어갑니다.\n      \t\tgetCurrentPosition(성공,실패,옵션);\n        */\n        geolocation.getCurrentPosition(성공함수, 실패함수, 옵션);\n    },[])\n\n\treturn(\n    \t\u003cdiv\u003e\n          \u003cp\u003e위도 : {location?.latitude}\u003c/p\u003e\n          \u003cp\u003e적도 : {location?.longitude}\u003c/p\u003e\n          {err \u0026\u0026 (\n            \u003cp\u003e\n              에러 : 에러코드 {err?.code} , 에러메세지 {err?.message}\n            \u003c/p\u003e\n          )}\n    \t\u003c/div\u003e\n    )\n\n\n}\n```\n\n![241019-041128](/posts/geolocation-api/241019-041128.png)\n\n그러면 현재위치를 가져올 수 있게 됩니다.\n\n\u003cbr/\u003e\n\n#### 옵션\n\n위에서 말했던 것처럼 옵션도 존재합니다.\n\n총 3가지의 옵션을 넣을 수가 있습니다.\n\n**maximumAge**는 캐시 된 이전 위치 정보를 사용할 수 있는 최대 시간을 지정합니다. 이 기능을 사용하면 매번 새로운 위치를 가져올 필요가 없습니다. 기본값은 0입니다.\n\n**timeout**은 현재 위치를 가져올 때까지 기다리는 시간을 의미합니다. 설정한 시간 안에 가져오지 못하면 에러가 발생되게 됩니다. 기본값은 Infinity입니다.\n\n**enableHighAccuracy**는 정확한 위치를 제공할 것인지에 대한 옵션입니다. **true**로 지정할 경우 더 높은 정확도를 가진 위치 정보를 가져오게 되는데 가져오는 속도가 느려집니다. **false**로 설정할 경우 빠른 속도로 정보를 가져올 수 있습니다.  \n기본값은 false입니다.\n\n\u003cbr/\u003e\n\n#### 전체 코드\n\n\u003ciframe src=\"https://codesandbox.io/embed/rmdhs4?view=Editor+%2B+Preview\u0026amp;module=%2Fsrc%2FApp.tsx\" width=\"100%\" height=\"500\"\u003e\u003c/iframe\u003e\n\n해당 방식을 이용해서 커스텀훅을 작성하면 좀 더 쉽게 여러 컴포넌트에서 불러올 수 있게 됩니당\n\n참고자료 :)\n\n[https://developer.mozilla.org/en-US/docs/Web/API/Geolocation](https://developer.mozilla.org/en-US/docs/Web/API/Geolocation)","slug":"/post/geolocation-api","readingMinutes":8,"wordCount":634,"category":"discover"}]]],"fallback":false},"__N_SSG":true},"page":"/category/[...slugs]","query":{"slugs":["discover","react"]},"buildId":"wMXNuEISwK9Jz7eThPruh","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
